name: Build Standalone EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone executable
        run: bun run tauri build --no-bundle

      - name: Collect executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src-tauri\target\release\neverlosetauriofficial.exe dist\NeverloseLauncher.exe
          $hash = (Get-FileHash dist\NeverloseLauncher.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  NeverloseLauncher.exe" | Out-File -Encoding utf8 dist\SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "Neverlose Launcher ${{ github.ref_name }}"
          body: "Standalone launcher executable built from ${{ github.sha }}."
          draft: false
          prerelease: ${{ contains(github.ref_name, '-test') || contains(github.ref_name, '-nightly') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/NeverloseLauncher.exe
            dist/SHA256SUMS.txt
